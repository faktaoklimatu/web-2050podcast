name: Fetch RSS

on:
  workflow_dispatch:
    inputs:
      feed_url:
        description: "RSS feed URL"
        required: false
        default: "https://anchor.fm/s/1039e0eb8/podcast/rss"
      limit:
        description: "Number of most recent episodes to include"
        required: false
        default: "10"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch feed and render summary
        env:
          FEED_URL: ${{ inputs.feed_url }}
          LIMIT: ${{ inputs.limit }}
          OUTPUT_DIR: site
        run: python utils/episode-list/fetch_rss.py
